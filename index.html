<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportReserve | Reserva tu Pista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="bg-indigo-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">🏆 SportReserve</h1>
            <span class="text-sm bg-indigo-500 px-3 py-1 rounded-full">Panel de Usuario</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold text-slate-800 mb-2">Reserva tu próxima victoria</h2>
            <p class="text-slate-500">Selecciona pista, fecha y hora. Recibirás la confirmación al instante.</p>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="md:col-span-2">
                <form id="formReserva" class="glass p-8 rounded-2xl shadow-xl border border-slate-200">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold mb-2 text-slate-700">Selecciona el Deporte/Pista</label>
                            <select name="pista" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                <option value="1">Pista de Pádel Central (Cristal)</option>
                                <option value="2">Pista de Tenis 1 (Tierra Batida)</option>
                                <option value="3">Cancha Baloncesto Exterior</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-slate-700">Fecha</label>
                                <input type="date" name="fecha" required class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-slate-700">Hora</label>
                                <select name="hora" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option value="09:00">09:00 AM</option>
                                    <option value="10:00">10:00 AM</option>
                                    <option value="11:00">11:00 AM</option>
                                    <option value="17:00">17:00 PM</option>
                                    <option value="18:00">18:00 PM</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-2 text-slate-700">Tu correo electrónico</label>
                            <input type="email" name="email" placeholder="ejemplo@correo.com" required 
                                   class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>

                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-indigo-200 transform hover:-translate-y-1">
                            Confirmar Reserva Gratis
                        </button>
                    </div>
                </form>
            </div>

            <div class="space-y-4">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-indigo-600 mb-2">⚡ Reserva Express</h3>
                    <p class="text-sm text-slate-600">Tu reserva se bloquea al instante en nuestro sistema.</p>
                </div>
                <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100 shadow-sm text-indigo-800">
                    <h3 class="font-bold mb-2">📍 Ubicación</h3>
                    <p class="text-sm italic">Polideportivo Municipal Marc, Calle del Deporte s/n.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="modalSuccess" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">✓</div>
            <h3 class="text-2xl font-bold mb-2">¡Reserva Lista!</h3>
            <p id="modalMsg" class="text-slate-600 mb-6"></p>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold">Entendido</button>
        </div>
    </div>

    <script>
        document.getElementById('formReserva').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = "Procesando...";
            btn.disabled = true;

            try {
                const formData = new FormData(e.target);
                const resp = await fetch('ws.php?accion=reservar', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();

                if(data.status === 'ok') {
                    document.getElementById('modalMsg').innerText = data.message;
                    document.getElementById('modalSuccess').classList.remove('hidden');
                } else {
                    alert("Error: " + data.message);
                    btn.disabled = false;
                    btn.innerHTML = "Confirmar Reserva Gratis";
                }
            } catch (err) {
                alert("Error de conexión con el servidor");
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
